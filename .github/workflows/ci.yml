name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS build, contracts, and bundle
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Toolchain
        run: swift --version
      - name: Build
        run: make macos-build
      - name: Domain and adapter contracts
        run: make macos-test
      - name: Xcode-native app contract
        run: make xcode-project-test
      - name: Release bundle contract
        run: make macos-release-test ARCHITECTURE=universal
      - name: Shell syntax
        run: bash -n script/*.sh

  android:
    name: Optional Android experiment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            apps/android/*.gradle.kts
            apps/android/gradle/wrapper/gradle-wrapper.properties
      - name: Unit tests
        run: make android-test
